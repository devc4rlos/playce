name: Deploy

on:
  workflow_run:
    workflows: [Image Build]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/docker/playce

            git pull origin

            echo "==> Logging into GitHub Container Registry on the VPS..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            echo "==> Pulling the latest image (:latest)..."
            docker pull ghcr.io/${{ github.repository }}:latest

            docker compose -f docker-compose.prod.yml down -v

            echo "==> Recreating containers with the new image..."
            docker compose -f docker-compose.prod.yml up -d

            echo "==> Running database migrations..."
            docker compose -f docker-compose.prod.yml exec app_playce php artisan migrate --force

            echo "==> Cleaning up unused Docker resources..."
            docker image prune -af
            docker container prune -f

            echo "==> Deployment completed successfully!"
