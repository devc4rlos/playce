services:
  app_playce:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - UID=${HOST_UID}
        - GID=${HOST_GID}
    user: "${HOST_UID}:${HOST_GID}"
    restart: no
    container_name: app_playce
    networks:
      - proxy

  worker_playce:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - UID=${HOST_UID}
        - GID=${HOST_GID}
    user: "${HOST_UID}:${HOST_GID}"
    restart: no
    depends_on:
      mysql:
        condition: service_healthy
    container_name: worker_playce
    networks:
      - proxy
    command: php artisan queue:work --sleep=3 --tries=3

  nginx_playce:
    restart: no
    ports:
      - "80:80"
    container_name: nginx_playce
    networks:
      - proxy

  mysql:
    image: 'mysql:8.0'
    container_name: mysql_playce
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - proxy
    volumes:
      - mysql_data:/var/lib/mysql

networks:
  proxy:
    external: true

volumes:
  mysql_data:
