services:
  app_playce:
    image: ghcr.io/devc4rlos/playce:latest
    container_name: app_playce
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
      - app_files:/var/www
    networks:
      - proxy

  worker_playce:
    image: ghcr.io/devc4rlos/playce:latest
    container_name: worker_playce
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
      - app_files:/var/www
    networks:
      - proxy
    command: php artisan queue:work --sleep=3 --tries=3

  nginx_playce:
    image: nginx:stable-alpine
    container_name: nginx_playce
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - app_files:/var/www:ro
    depends_on:
      - app_playce
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.playce-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.routers.playce-http.rule=Host(`playce.carlosalexandre.com.br`)"
      - "traefik.http.routers.playce-http.entrypoints=web"
      - "traefik.http.routers.playce-http.middlewares=playce-redirect-https"
      - "traefik.http.routers.playce-https.rule=Host(`playce.carlosalexandre.com.br`)"
      - "traefik.http.routers.playce-https.entrypoints=websecure"
      - "traefik.http.routers.playce-https.tls.certresolver=myresolver"
      - "traefik.http.routers.playce-http.service=playce-service"
      - "traefik.http.routers.playce-https.service=playce-service"
      - "traefik.http.services.playce-service.loadbalancer.server.port=80"

networks:
  proxy:
    external: true

volumes:
  app_files:
